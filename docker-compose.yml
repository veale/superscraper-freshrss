version: '3.8'

services:
  # ── FreshRSS ────────────────────────────────────────────────────────────
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
      # Mount the extension for development:
      - ./xExtension-AutoFeed:/var/www/FreshRSS/extensions/xExtension-AutoFeed
    ports:
      - "8080:80"
    environment:
      TZ: Europe/London
      CRON_MIN: "*/15"
    restart: unless-stopped
    depends_on:
      autofeed-sidecar:
        condition: service_healthy

  # ── AutoFeed Sidecar ────────────────────────────────────────────────────
  autofeed-sidecar:
    build: ./sidecar
    container_name: autofeed-sidecar
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_BROWSERS_PATH: "/app/browsers"
      AUTOFEED_SESSION_SECRET: "${AUTOFEED_SESSION_SECRET:-}"   # set with: openssl rand -hex 32
      # AUTOFEED_FETCH_BACKEND: "bundled"               # bundled|playwright_server|browserless|scrapling_serve
      # AUTOFEED_PLAYWRIGHT_WS: "ws://playwright-server:3000/"
      # AUTOFEED_BROWSERLESS_WS: "ws://browserless:3000?token=${BROWSERLESS_TOKEN}"
      # AUTOFEED_SCRAPLING_URL: "http://scrapling-serve:8001"
      # AUTOFEED_RSS_BRIDGE_URL: "http://rss-bridge:80"
      # AUTOFEED_SERVICES_TOKEN: ""
    volumes:
      - sidecar-data:/app/data
      - sidecar-browsers:/app/browsers   # Cache Chromium across rebuilds
      - ./generated-bridges:/app/bridges
    deploy:
      resources:
        limits:
          memory: 2G
    shm_size: '1gb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--max-time", "3", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── RSS-Bridge (optional) ──────────────────────────────────────────────
  rss-bridge:
    image: rssbridge/rss-bridge:latest
    container_name: rss-bridge
    volumes:
      - ./rss-bridge-config:/config
      - ./generated-bridges:/config/bridges
    ports:
      - "3000:80"
    restart: unless-stopped
    profiles:
      - with-rss-bridge   # Only starts with: docker compose --profile with-rss-bridge up

  # ── Optional: bring-your-own browser farm ──────────────────────────────
  # Uncomment and configure ONE of these, then set
  # AUTOFEED_FETCH_BACKEND on the autofeed-sidecar service to match.

  playwright-server:
    image: mcr.microsoft.com/playwright:v1.47.0-jammy
    command: ["npx", "-y", "playwright", "run-server", "--port=3000"]
    ports: ["3001:3000"]
    profiles: ["with-external-browsers"]

  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      TOKEN: "${BROWSERLESS_TOKEN:-}"
      MAX_CONCURRENT_SESSIONS: "5"
    ports: ["3002:3000"]
    profiles: ["with-external-browsers"]

  scrapling-serve:
    image: ghcr.io/d4vinci/scrapling:latest
    command: ["scrapling", "serve", "--host", "0.0.0.0", "--port", "8001"]
    ports: ["8001:8001"]
    profiles: ["with-external-browsers"]

volumes:
  freshrss-data:
  freshrss-extensions:
  sidecar-data:
  sidecar-browsers:
